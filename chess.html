<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/mainstyle.css">
</head>

<body>
    <header>
        <h2 align="center">Can defeat a chess robot?</h2>
    </header>
    <div id="notification-container"></div>
    <br>

    <label id="blackCaptured"></label>
    <p align="center">
    <div style="display: flex;">
        <div style="position: relative; display: inline-block;">
            <canvas id="canvas-border" width="640" height="640"
                style="border:1px solid #ffffff;position: absolute; left: 0; top: 0;"></canvas>
            <canvas id="canvas-chess" width="600" height="600"
                style="border:1px solid rgb(0, 0, 0);position: relative; margin: 20px; border: 2px solid #333;"></canvas>
        </div>
        <div>
            <h3 style="margin-left: 20px;">History</h3>
            <ol id="movesHistiry" class="scroll-list" reversed></ol>
        </div>
    </div>
    </p>

    <label id="whiteCaptured"></label>

    <div class="button-container" style="margin-left: 20px;">
        <p>Game complexity:
            <input type="number" id="difficultyInput" min="0" max="20" value="1"> of 20.
        </p>

        <button type="button" id="newGameButton">Start new game</button>
        <button disabled type="button" id="undoButton" onclick='undoMove()'>Undo</button>
        <button disabled type="button" id="surrenderButton">Surrender</button>

        <input type="checkbox" id="gameType" name="gameType" value="withRobot" checked>
        <label for="withRobot">Play with robot</label><br>
    </div>

    <br>

    <dialog id="surrenderDialog">
        <p>Surrender to the robot... Are you sure?</p>
        <form method="dialog">
            <button value="yes">Yes</button>
            <button value="cancel">Cancel</button>
        </form>
    </dialog>

    <div id="promotion-modal"
        style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div
            style="background:powderblue; margin:15% auto; padding:20px; width:200px; text-align:center; border-radius:8px;">
            <h3>Promote to:</h3>
            <button onclick="selectPromotion('q')">Queen</button>
            <button onclick="selectPromotion('r')">Rook</button>
            <button onclick="selectPromotion('b')">Bishop</button>
            <button onclick="selectPromotion('n')">Knight</button>
        </div>
    </div>
    <a style="margin-left: 20px;" href="index.html">Home</a>
</body>

<footer>
    <p>
        <img
            src="https://hitscounter.dev/api/hit?url=https%3A%2F%2Fvgerman256.github.io%2Fchess.html&label=Players&icon=github&color=%230a58ca&message=&style=social&tz=Europe%2FWarsaw">
</footer>

<script src="./js/StockfishWeb.js"></script>
<script type="module" src="./js/chess-game.js"></script>

</html>
